<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2E7D32" />
  <meta name="description"
    content="Clean Madurai – Smart Bio-Waste &amp; Civic Management System. Sell bio-waste easily, track civic complaints in real-time, and help build a cleaner Madurai." />
  
  <script>
    // Critical Diagnostics: Catch errors before React even loads
    window.onerror = function(msg, url, line, col, error) {
      var root = document.getElementById('root');
      var debugMsg = document.getElementById('debug-msg');
      var errorText = msg + (line ? ' (Line: ' + line + ')' : '');
      if (debugMsg) debugMsg.innerHTML = '<span style="color: #dc2626; font-weight: bold;">Error: ' + errorText + '</span>';
      console.error('Diagnostic Error:', msg, url, line, col, error);
    };
    function onMainStart() {
      var debugMsg = document.getElementById('debug-msg');
      if (debugMsg) debugMsg.innerHTML = 'React initializing components...';
    }
  </script>

  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>Clean Madurai – Smart Bio-Waste &amp; Civic Management System</title>
</head>

<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; background: #F4F7F3;">
      <div style="text-align: center; padding: 2rem;">
        <p style="color: #1B4332; font-weight: 800; font-size: 1.25rem; margin-bottom: 0.5rem; letter-spacing: -0.025em;">CLEAN MADURAI</p>
        <p style="color: #666; font-size: 0.875rem; margin-bottom: 1.5rem;">Loading smart city intelligence...</p>
        <div id="debug-msg" style="color: #999; font-size: 11px; font-family: monospace; background: rgba(0,0,0,0.03); padding: 0.5rem 1rem; rounded: 8px;">Waiting for JavaScript...</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
